<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <!-- 🔥 Open Graph -->
  <meta property="og:title" content="📰 Ray News">
  <meta property="og:description" content="Lee esta noticia en Ray News">
  <meta property="og:image" content="https://picsum.photos/600/300">
  <meta property="og:url" content="https://ray059.github.io/news.html">
  <meta name="twitter:card" content="summary_large_image">

  <title>Ray News</title>
</head>
<body>
  <p>Abriendo en Ray News...</p>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");
  
    const intentUrl = `intent://ray059.github.io/news.html?id=${id}#Intent;scheme=https;package=com.raynews.app;S.browser_fallback_url=https://play.google.com/store/apps/details?id=com.raynews.app;end`;
  
    setTimeout(() => {
      window.location.href = intentUrl;
    }, 500);

    // 🔥 intentar cerrar navegador
    setTimeout(() => {
      window.close();
    }, 1500);
    
  </script>
  
</body>
</html>
