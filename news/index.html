<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ray News</title>
</head>
<body>
  <p>Abriendo en la app...</p>

  <script>
    const appUrl = "raynews://open";
    const playStoreUrl = "https://play.google.com/store/apps/details?id=com.raynews.app";

    // Intentar abrir app
    window.location.href = appUrl;

    // Si no abre en 1.5 segundos → Play Store
    setTimeout(() => {
      window.location.href = playStoreUrl;
    }, 1500);
  </script>
</body>
</html>
