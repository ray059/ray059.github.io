<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ray News</title>
</head>
<body>
  <p>Abriendo en Ray News...</p>

  <script>
    // 🔥 Extraer ID desde la URL
    const pathParts = window.location.pathname.split("/");
    const id = pathParts[pathParts.length - 1];

    // 🔥 Crear intent con ID
    const intentUrl = `intent://news/${id}#Intent;scheme=https;package=com.raynews.app;S.browser_fallback_url=https://play.google.com/store/apps/details?id=com.raynews.app;end`;

    window.location.href = intentUrl;
  </script>
</body>
</html>
