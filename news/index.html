<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ray News</title>
</head>
<body>
  <p>Abriendo en la app...</p>

  <script>
    const newsId = window.location.pathname.split("/").pop();

    const intentUrl = `intent://news/${newsId}#Intent;scheme=https;package=com.raynews.app;S.browser_fallback_url=https://play.google.com/store/apps/details?id=com.raynews.app;end`;

    window.location.href = intentUrl;
  </script>
</body>
</html>
